<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Control</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0f;
        color: #e2e8f0;
        height: 100vh;
        overflow: hidden;
      }
      mc-app { display: block; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="loading" style="padding: 20px; font-family: sans-serif;">Loading Mission Control...</div>
    <mc-app></mc-app>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'color: #ef4444; background: #222; padding: 10px; border: 1px solid #ef4444; margin: 10px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;';
        el.textContent = 'Error: ' + (e.message || e);
        document.body.appendChild(el);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'color: #ef4444; background: #222; padding: 10px; border: 1px solid #ef4444; margin: 10px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;';
        el.textContent = 'Promise Rejection: ' + (e.reason || e);
        document.body.appendChild(el);
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
